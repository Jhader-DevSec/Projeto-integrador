<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login_page.css') }}">
    <title>Página de Login</title>
</head>
<body>
    <video autoplay muted loop playsinline id="bg-video">
        <source src="{{ url_for('static', filename='mp4/brasas_video.mp4') }}" type="video/mp4">
    </video>
    <main>
        <section class="login-area">
            <img src="{{ url_for('static', filename='img/logo.png') }}" alt="Logo da Empresa">
            
            <h2>Entrar no Sistema</h2>
            
            <form action="/autenticar" method="POST">
                <div class="form-group">
                    <label for="email">E-mail:</label>
                    <input 
                        type="email"
                        name="email"  
                        id="email"
                        required    
                        placeholder="exemplo@dominio.com"
                        autocomplete="email"
                    >
                </div>

                <div class="form-group">
                    <label for="password">Senha:</label>
                    <input 
                        type="password" 
                        name="password" 
                        id="password"
                        required
                        placeholder="Digite sua senha"
                        autocomplete="current-password"
                    >
                </div>

                <button type="submit">Entrar</button>
            </form>

            <nav class="login-helper">
                <p>Esqueceu a senha? <a href="/recuperar">Clique aqui</a></p>
            </nav>
        </section>
    </main>
</body>
</html>
